name: lead360_mobile
description: Lead360 CRM — mobile companion (iOS + Android).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State management
  flutter_riverpod: ^2.5.1
  # Networking
  dio: ^5.5.0
  # Navigation
  go_router: ^14.2.0
  # Secure token storage
  flutter_secure_storage: ^9.2.2
  # Formatting
  intl: ^0.19.0
  # tel: / mailto: / wa.me deep links
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
